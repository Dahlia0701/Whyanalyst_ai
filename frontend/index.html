<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhyAnalyst AI</title>
    <!-- Including Plotly CDN for rendering interactive graphs -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <!-- 1. Header showing active session datasets -->
        <header class="header">
            <h3>WhyAnalyst AI</h3>
            <div id="dataset-status" class="dataset-status">
                <span id="status" class="badge offline">No files uploaded</span> 
            </div>
        </header>

        <!-- 2. Chat history scroll area -->
        <main id="chat-history" class="chat-history">
            <!-- Centered, borderless elegant welcome message -->
            <div class="welcome-container">
                <div class="welcome-message">
                    <p>Hello! Upload your dataset (.csv) to begin analyzing your data.</p>
                </div>
            </div>
        </main>

        <!-- 3. Fixed control panel at the bottom -->
        <footer class="input-panel">
            <!-- Row 1: Upload (Left) -> Input (Center) -> Send Button (Right) -->
            <div class="input-row">
                <!-- File upload button -->
                <label for="file-upload" class="upload-btn" title="Upload CSV(s)">📎</label>
                <!-- used 'multiple' user can select 2 files -->
                <input type="file" id="file-upload" accept=".csv" multiple style="display: none;" />
                
                <!-- Query text input -->
                <input type="text" id="query-input" placeholder="Ask a question about your dataset..." disabled />
                
                <!-- Submit query button -->
                <button id="send-btn" class="send-btn" disabled>▲</button>
            </div>
            
            <!-- Row 2: Tip Message Beneath the Controls -->
            <div class="tip-row">
                <span class="upload-tip">Upload up to 2 CSV files (Primary Dataset & optional Prediction Dataset)</span>
            </div>
        </footer>
    </div>

    <script src="work.js"></script>
</body>
</html>
